services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: fontakip_db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=FonTakip.2026
    ports:
      - "1433:1433"
    volumes:
      - fontakip_db_data:/var/opt/mssql

  api:
    build: 
      context: ./FonTakip.API
      dockerfile: Dockerfile
    container_name: fontakip_api
    depends_on:
      - db
    ports:
      - "5043:5043"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db,1433;Database=FonTakipDb;User Id=sa;Password=FonTakip.2026;TrustServerCertificate=True;

volumes:
  fontakip_db_data:
